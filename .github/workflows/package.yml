name: 🏛️ Shensist-AIS 云端封装工厂

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        pip install pyinstaller flask flask-cors pyautogui
    - name: Build Windows EXE
      run: |
        pyinstaller --onefile --noconsole --name=Shensist_AirEye_Win Shensist_Web_Master.py
    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v2.6.3
        name: 🏛️ 神思庭 (Shensist-AIS) 控制终端 v2.6.3
        draft: false
        prerelease: false
        files: dist/Shensist_AirEye_Win.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
