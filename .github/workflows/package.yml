name: 🏛️ 神思AirEye 全平台封装工厂

on:
  push:
    branches: [ main, master ] # 兼容双分支触发

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        include:
          - os: windows-latest
            artifact_name: Shensist_AirEye_Win.exe
          - os: macos-latest
            artifact_name: Shensist_AirEye_Mac
          - os: ubuntu-latest
            artifact_name: Shensist_AirEye_Linux

    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        pip install pyinstaller flask flask-cors pyautogui
        if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
          sudo apt-get update
          sudo apt-get install -y python3-tk python3-dev
        fi
      shell: bash
    - name: Build Executable
      run: pyinstaller --onefile --noconsole --name=${{ matrix.artifact_name }} Shensist_Web_Master.py
      shell: bash
    - name: Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v2.6.5
        name: 🏛️ 神思AirEye v2.6.5 (全平台合拢版)
        files: dist/${{ matrix.artifact_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
