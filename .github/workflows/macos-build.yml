name: 🏛️ Shensist-AIS macOS 打包

on:
  push:
    tags:
      - 'v*' # 当你发布新版本号时自动触发

jobs:
  build:
    runs-on: macos-latest # 使用 GitHub 提供的苹果虚拟机
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装打包依赖
        run: |
          pip install pyinstaller flask pyautogui
          # 注意：macOS 无需安装 evdev

      - name: 执行 PyInstaller 封印
        run: |
          pyinstaller --onefile --windowed \
            --name "Shensist_AirEye_Mac" \
            --add-data "logo_ts.webp:." \
            --add-data "skills_map.json:." \
            Shensist_Launcher.py

      - name: 发布 Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Shensist_AirEye_Mac
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
